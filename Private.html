
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drywall Takeoff Calculator</title>
<style>
  :root {
    --c-bg: #f5f4f0;
    --c-surface: #ffffff;
    --c-border: rgba(0,0,0,0.12);
    --c-border-strong: rgba(0,0,0,0.22);
    --c-text: #1a1a18;
    --c-muted: #6b6b67;
    --c-accent: #185FA5;
    --c-accent-bg: #E6F1FB;
    --c-accent-text: #0C447C;
    --c-success: #3B6D11;
    --c-success-bg: #EAF3DE;
    --c-warn: #854F0B;
    --c-warn-bg: #FAEEDA;
    --c-danger: #A32D2D;
    --c-danger-bg: #FCEBEB;
    --c-purple: #534AB7;
    --c-purple-bg: #EEEDFE;
    --c-teal: #0F6E56;
    --c-teal-bg: #E1F5EE;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --c-bg: #1c1c1a;
      --c-surface: #242422;
      --c-border: rgba(255,255,255,0.1);
      --c-border-strong: rgba(255,255,255,0.2);
      --c-text: #f0efe8;
      --c-muted: #9b9b94;
      --c-accent: #85B7EB;
      --c-accent-bg: #042C53;
      --c-accent-text: #B5D4F4;
      --c-success: #97C459;
      --c-success-bg: #173404;
      --c-warn: #EF9F27;
      --c-warn-bg: #412402;
      --c-danger: #F09595;
      --c-danger-bg: #501313;
      --c-purple: #AFA9EC;
      --c-purple-bg: #26215C;
      --c-teal: #5DCAA5;
      --c-teal-bg: #04342C;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--c-bg);
    color: var(--c-text);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }
  /* Header */
  .app-header {
    background: var(--c-surface);
    border-bottom: 0.5px solid var(--c-border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .app-header h1 { font-size: 16px; font-weight: 500; letter-spacing: -0.01em; }
  .header-meta { display: flex; align-items: center; gap: 16px; }
  .project-inputs { display: flex; gap: 8px; }
  .project-inputs input {
    border: 0.5px solid var(--c-border);
    background: var(--c-bg);
    color: var(--c-text);
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 13px;
    width: 140px;
  }
  .project-inputs input:focus { outline: none; border-color: var(--c-accent); }
  .btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: 0.5px solid var(--c-border-strong);
    background: transparent;
    color: var(--c-text);
    font-size: 13px;
    cursor: pointer;
    font-weight: 500;
    transition: background 0.15s;
  }
  .btn:hover { background: var(--c-border); }
  .btn-primary {
    background: var(--c-accent);
    color: #fff;
    border-color: transparent;
  }
  .btn-primary:hover { opacity: 0.88; background: var(--c-accent); }

  /* Layout */
  .layout { display: flex; min-height: calc(100vh - 56px); }

  /* Sidebar Nav */
  .sidebar {
    width: 200px;
    background: var(--c-surface);
    border-right: 0.5px solid var(--c-border);
    padding: 16px 0;
    flex-shrink: 0;
    position: sticky;
    top: 56px;
    height: calc(100vh - 56px);
    overflow-y: auto;
  }
  .sidebar-section { padding: 0 12px 8px; font-size: 10px; font-weight: 500; color: var(--c-muted); letter-spacing: 0.06em; text-transform: uppercase; margin-top: 12px; }
  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 16px;
    cursor: pointer;
    border-radius: 0;
    font-size: 13px;
    color: var(--c-muted);
    transition: background 0.12s, color 0.12s;
    border-left: 2px solid transparent;
  }
  .sidebar-item:hover { background: var(--c-accent-bg); color: var(--c-accent-text); }
  .sidebar-item.active { color: var(--c-accent); border-left-color: var(--c-accent); background: var(--c-accent-bg); font-weight: 500; }
  .sidebar-item .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

  /* Main content */
  .main { flex: 1; padding: 24px; overflow-y: auto; }

  /* Tabs */
  .tab-bar {
    display: flex;
    gap: 0;
    border-bottom: 0.5px solid var(--c-border);
    margin-bottom: 24px;
  }
  .tab {
    padding: 10px 20px;
    font-size: 13px;
    font-weight: 500;
    color: var(--c-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -0.5px;
    transition: color 0.12s;
  }
  .tab.active { color: var(--c-accent); border-bottom-color: var(--c-accent); }
  .tab:hover { color: var(--c-text); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Floor section */
  .floor-section {
    background: var(--c-surface);
    border: 0.5px solid var(--c-border);
    border-radius: 10px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .floor-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--c-bg);
    border-bottom: 0.5px solid var(--c-border);
    cursor: pointer;
    user-select: none;
  }
  .floor-title { font-size: 13px; font-weight: 500; }
  .floor-badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--c-accent-bg);
    color: var(--c-accent-text);
    font-weight: 500;
  }
  .floor-body { padding: 16px; display: block; }
  .floor-body.collapsed { display: none; }

  /* Grid table for drywall entries */
  .dw-grid {
    display: grid;
    gap: 6px;
  }
  .dw-row {
    display: grid;
    grid-template-columns: 90px 80px 80px repeat(6, 60px) 70px;
    gap: 6px;
    align-items: center;
  }
  .dw-row.header .cell {
    font-size: 11px;
    font-weight: 500;
    color: var(--c-muted);
    text-align: center;
  }
  .dw-row.header .cell:first-child { text-align: left; }
  .cell { font-size: 12px; }
  .cell input[type=number] {
    width: 100%;
    border: 0.5px solid var(--c-border);
    background: var(--c-bg);
    color: var(--c-text);
    padding: 4px 6px;
    border-radius: 5px;
    font-size: 12px;
    text-align: center;
  }
  .cell input[type=number]:focus { outline: none; border-color: var(--c-accent); }
  .cell.label { font-size: 12px; color: var(--c-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cell.type-badge {
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 4px;
    text-align: center;
    font-weight: 500;
  }
  .cell.computed { text-align: center; font-size: 12px; font-weight: 500; color: var(--c-accent-text); }

  /* Type colors */
  .badge-regular { background: var(--c-teal-bg); color: var(--c-teal); }
  .badge-typex { background: var(--c-warn-bg); color: var(--c-warn); }
  .badge-typec { background: var(--c-purple-bg); color: var(--c-purple); }
  .badge-dens { background: var(--c-accent-bg); color: var(--c-accent-text); }
  .badge-m2 { background: var(--c-success-bg); color: var(--c-success); }
  .badge-durock { background: var(--c-danger-bg); color: var(--c-danger); }
  .badge-ceiling { background: #F1EFE8; color: #5F5E5A; }

  /* Extras row */
  .extras-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 8px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 0.5px solid var(--c-border);
  }
  .extra-item { display: flex; flex-direction: column; gap: 3px; }
  .extra-item label { font-size: 11px; color: var(--c-muted); font-weight: 500; }
  .extra-item input {
    border: 0.5px solid var(--c-border);
    background: var(--c-bg);
    color: var(--c-text);
    padding: 4px 8px;
    border-radius: 5px;
    font-size: 12px;
    width: 100%;
  }
  .extra-item input:focus { outline: none; border-color: var(--c-accent); }

  /* Bead table */
  .bead-grid {
    display: grid;
    gap: 6px;
  }
  .bead-row {
    display: grid;
    grid-template-columns: 100px repeat(5, 60px) 70px;
    gap: 6px;
    align-items: center;
  }
  .bead-row.header .cell { font-size: 11px; font-weight: 500; color: var(--c-muted); text-align: center; }
  .bead-row.header .cell:first-child { text-align: left; }

  /* Steel table */
  .steel-grid { display: grid; gap: 6px; }
  .steel-row {
    display: grid;
    grid-template-columns: 90px 80px repeat(4, 60px) 70px;
    gap: 6px;
    align-items: center;
  }
  .steel-row.header .cell { font-size: 11px; font-weight: 500; color: var(--c-muted); text-align: center; }
  .steel-row.header .cell:first-child { text-align: left; }

  /* Summary panel */
  .summary-panel {
    background: var(--c-surface);
    border: 0.5px solid var(--c-border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .summary-title { font-size: 12px; font-weight: 500; color: var(--c-muted); margin-bottom: 12px; letter-spacing: 0.04em; text-transform: uppercase; }
  .summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
  .summary-card {
    background: var(--c-bg);
    border-radius: 7px;
    padding: 10px 12px;
  }
  .summary-card .sc-label { font-size: 11px; color: var(--c-muted); margin-bottom: 4px; }
  .summary-card .sc-value { font-size: 20px; font-weight: 500; color: var(--c-text); line-height: 1; }
  .summary-card .sc-unit { font-size: 11px; color: var(--c-muted); margin-top: 2px; }
  .summary-card.highlight { background: var(--c-accent-bg); }
  .summary-card.highlight .sc-value { color: var(--c-accent-text); }

  /* Waste + settings bar */
  .settings-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--c-surface);
    border: 0.5px solid var(--c-border);
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .setting-item { display: flex; align-items: center; gap: 8px; }
  .setting-item label { font-size: 12px; color: var(--c-muted); font-weight: 500; white-space: nowrap; }
  .setting-item input[type=number] {
    width: 64px;
    border: 0.5px solid var(--c-border);
    background: var(--c-bg);
    color: var(--c-text);
    padding: 4px 8px;
    border-radius: 5px;
    font-size: 12px;
    text-align: center;
  }
  .setting-item input:focus { outline: none; border-color: var(--c-accent); }
  .setting-item select {
    border: 0.5px solid var(--c-border);
    background: var(--c-bg);
    color: var(--c-text);
    padding: 4px 8px;
    border-radius: 5px;
    font-size: 12px;
  }
  .setting-item select:focus { outline: none; border-color: var(--c-accent); }

  /* Print summary */
  .print-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .print-table th { text-align: left; padding: 8px 12px; background: var(--c-bg); font-size: 11px; font-weight: 500; color: var(--c-muted); letter-spacing: 0.04em; text-transform: uppercase; }
  .print-table td { padding: 8px 12px; border-bottom: 0.5px solid var(--c-border); }
  .print-table tr:last-child td { border-bottom: none; }
  .print-table .num { text-align: right; font-weight: 500; }
  .print-table .total-row td { font-weight: 500; background: var(--c-accent-bg); color: var(--c-accent-text); }

  /* Collapse toggle */
  .toggle-icon { font-size: 10px; color: var(--c-muted); transition: transform 0.2s; }
  .toggle-icon.open { transform: rotate(90deg); }

  /* Divider */
  .section-divider { font-size: 11px; font-weight: 500; color: var(--c-muted); letter-spacing: 0.06em; text-transform: uppercase; margin: 16px 0 8px; }

  /* Scrollable table wrapper */
  .table-scroll { overflow-x: auto; }

  @media print {
    .sidebar, .app-header .btn, .settings-bar { display: none; }
    .main { padding: 0; }
    .floor-body.collapsed { display: block !important; }
  }
</style>
</head>
<body>

<header class="app-header">
  <h1>Drywall Takeoff</h1>
  <div class="header-meta">
    <div class="project-inputs">
      <input type="text" id="builderName" placeholder="Builder name" />
      <input type="text" id="siteName" placeholder="Site / lot" />
    </div>
    <button class="btn" onclick="clearAll()">Clear all</button>
    <button class="btn btn-primary" onclick="window.print()">Print / Export</button>
  </div>
</header>

<div class="layout">
  <nav class="sidebar">
    <div class="sidebar-section">Sections</div>
    <div class="sidebar-item active" onclick="showTab('drywall',this)"><span class="dot"></span>Drywall</div>
    <div class="sidebar-item" onclick="showTab('bead',this)"><span class="dot"></span>Bead &amp; Bulkhead</div>
    <div class="sidebar-item" onclick="showTab('steel',this)"><span class="dot"></span>Steel</div>
    <div class="sidebar-item" onclick="showTab('summary',this)"><span class="dot"></span>Summary</div>
  </nav>

  <main class="main">

    <!-- Settings bar -->
    <div class="settings-bar">
      <div class="setting-item">
        <label>Waste / overage</label>
        <input type="number" id="wastePct" value="10" min="0" max="50" step="1" oninput="recalcAll()"> <span style="font-size:12px;color:var(--c-muted)">%</span>
      </div>
      <div class="setting-item">
        <label>Default ceiling ht (ft)</label>
        <input type="number" id="ceilHt" value="9" min="7" max="20" step="1" oninput="recalcAll()">
      </div>
      <div class="setting-item">
        <label>Floors active</label>
        <select id="floorCount" onchange="renderFloors()">
          <option value="2">2 floors (1st + 2nd)</option>
          <option value="3" selected>3 floors (+ Basement)</option>
          <option value="4">4 floors (+ Garage)</option>
          <option value="5">5 floors (+ 3rd)</option>
        </select>
      </div>
    </div>

    <!-- DRYWALL TAB -->
    <div id="tab-drywall" class="tab-panel active">
      <div id="drywall-floors"></div>
    </div>

    <!-- BEAD TAB -->
    <div id="tab-bead" class="tab-panel">
      <div id="bead-floors"></div>
    </div>

    <!-- STEEL TAB -->
    <div id="tab-steel" class="tab-panel">
      <div id="steel-floors"></div>
    </div>

    <!-- SUMMARY TAB -->
    <div id="tab-summary" class="tab-panel">
      <div id="summary-content"></div>
    </div>

  </main>
</div>

<script>
const FLOORS = ['2nd Floor','1st Floor','Basement','Garage','3rd Floor'];

// Drywall sheet sizes: [thickness, width, length]
const DW_TYPES = [
  { type:'Regular', thickness:'1/2"', width:'48"', lengths:[7,8,9,10,12], badge:'badge-regular' },
  { type:'Regular', thickness:'1/2"', width:'54"', lengths:[8,10,12], badge:'badge-regular' },
  { type:'Ceiling', thickness:'1/2"', width:'48"', lengths:[8,10,12], badge:'badge-ceiling' },
  { type:'Densshield', thickness:'1/2"', width:'48"', lengths:[5,8], badge:'badge-dens' },
  { type:'M2 Tech', thickness:'1/2"', width:'48"', lengths:[8,10,12], badge:'badge-m2' },
  { type:'Type C', thickness:'1/2"', width:'48"', lengths:[8,9,10,12], badge:'badge-typec' },
  { type:'Type X', thickness:'5/8"', width:'48"', lengths:[8,9,10,12], badge:'badge-typex' },
  { type:'Type X', thickness:'5/8"', width:'54"', lengths:[12], badge:'badge-typex' },
  { type:'Type C', thickness:'5/8"', width:'48"', lengths:[8,9,10,12], badge:'badge-typec' },
  { type:'M2 Tech', thickness:'5/8"', width:'48"', lengths:[8,10], badge:'badge-m2' },
  { type:'Densshield', thickness:'5/8"', width:'48"', lengths:[8], badge:'badge-dens' },
  { type:'Regular', thickness:'1/4"', width:'48"', lengths:[8,12], badge:'badge-regular' },
  { type:'Durock', thickness:'1/2"', width:'48"', lengths:[5,8], badge:'badge-durock' },
];

// Bead types with lengths
const BEAD_TYPES = [
  { name:'G1-U', label:'G1-U (standard)', lengths:[7,8,9,10,12] },
  { name:'A10A', label:'A10A', lengths:[8,9,10] },
  { name:'G4 1/2"', label:'G4 ½"', lengths:[8,10] },
  { name:'410#', label:'410#', lengths:[8,10] },
  { name:'G1-B', label:'G1-B (round)', lengths:[8,9,10] },
  { name:'G1-B/O', label:'G1-B/O', lengths:[8,9,10] },
  { name:'730#', label:'730#', lengths:[8,10] },
];

// Steel types
const STEEL_TYPES = [
  { type:'Track', size:'1 5/8"', lengths:[8,9,10,12] },
  { type:'Track', size:'2 1/2"', lengths:[8,9,10,12] },
  { type:'Track', size:'3 5/8"', lengths:[8,9,10,12] },
  { type:'Track', size:'3 5/8" Flex', lengths:[8,9,10,12] },
  { type:'Stud', size:'1 5/8"', lengths:[8,9,10,12] },
  { type:'Stud', size:'2 1/2"', lengths:[8,9,10,12] },
  { type:'Stud', size:'3 5/8"', lengths:[8,9,10,12] },
  { type:'Res Ch', size:'—', lengths:[12] },
  { type:'Fur Ch', size:'—', lengths:[10] },
  { type:'Angle', size:'1"×1½"', lengths:[8,10] },
];

const EXTRAS_DW = [
  { key:'pots', label:'Pot lights' },
  { key:'res', label:'Res channels' },
  { key:'angle', label:'Angle (ft)' },
  { key:'ceilFt', label:'Ceiling sq ft' },
  { key:'dblLayer', label:'Double layer sq ft' },
  { key:'greenGlue', label:'Green glue sheets' },
  { key:'peak', label:'Peak (sq ft)' },
  { key:'skylight', label:'Skylights' },
  { key:'otaSmall', label:'OTA <64 sq ft' },
  { key:'otaMed', label:'OTA 64–319 sq ft' },
  { key:'niche', label:'Niche (each)' },
  { key:'dwExtra', label:'DW Extra sheets' },
];

const EXTRAS_BEAD = [
  { key:'sureCorner', label:'Sure corner (ft)' },
  { key:'taperExtra', label:'Taper extra' },
  { key:'texture', label:'Texture (Y/N)', type:'text' },
];

const EXTRAS_STEEL = [
  { key:'miscSteel', label:'Misc (ft)' },
];

let state = {};

function initState() {
  const floors = parseInt(document.getElementById('floorCount').value);
  state = {};
  for (let f = 0; f < floors; f++) {
    const fl = FLOORS[f];
    state[fl] = {
      dw: {},
      bead: {},
      steel: {},
      extras_dw: {},
      extras_bead: {},
      extras_steel: {},
      collapsed: { dw: f > 0, bead: f > 0, steel: f > 0 }
    };
  }
}

function getFloors() {
  return FLOORS.slice(0, parseInt(document.getElementById('floorCount').value));
}

function renderFloors() {
  const floors = getFloors();
  // preserve existing state for floors still active
  const prev = state;
  state = {};
  floors.forEach(fl => {
    state[fl] = prev[fl] || {
      dw: {}, bead: {}, steel: {},
      extras_dw: {}, extras_bead: {}, extras_steel: {},
      collapsed: { dw: floors.indexOf(fl) > 0, bead: true, steel: true }
    };
  });
  renderDrywall();
  renderBead();
  renderSteel();
  recalcAll();
}

// ---- DRYWALL ----
function renderDrywall() {
  const floors = getFloors();
  const container = document.getElementById('drywall-floors');
  container.innerHTML = '';

  floors.forEach(fl => {
    const s = state[fl];
    const div = document.createElement('div');
    div.className = 'floor-section';
    div.id = `dw-floor-${fl.replace(/\s/g,'_')}`;

    const totalSheets = calcDwTotal(fl);
    const isCollapsed = s.collapsed.dw;

    div.innerHTML = `
      <div class="floor-header" onclick="toggleFloor('dw','${fl}')">
        <span class="floor-title">${fl}</span>
        <div style="display:flex;align-items:center;gap:10px;">
          <span class="floor-badge" id="dw-badge-${fl.replace(/\s/g,'_')}">${totalSheets} sheets</span>
          <span class="toggle-icon ${isCollapsed ? '' : 'open'}" id="dw-toggle-${fl.replace(/\s/g,'_')}">&#9654;</span>
        </div>
      </div>
      <div class="floor-body ${isCollapsed ? 'collapsed' : ''}" id="dw-body-${fl.replace(/\s/g,'_')}">
        <div class="table-scroll">
          <div class="dw-grid">
            <div class="dw-row header">
              <div class="cell">Type</div>
              <div class="cell">Thickness</div>
              <div class="cell">Width</div>
              ${getDwLengthHeaders()}
              <div class="cell">Subtotal</div>
            </div>
            ${DW_TYPES.map((t,i) => renderDwRow(fl, t, i)).join('')}
          </div>
        </div>
        <div class="extras-grid">
          ${EXTRAS_DW.map(e => `
            <div class="extra-item">
              <label>${e.label}</label>
              <input type="number" min="0" value="${s.extras_dw[e.key]||0}" 
                oninput="state['${fl}'].extras_dw['${e.key}']=+this.value; recalcDwBadge('${fl}')" />
            </div>`).join('')}
        </div>
      </div>
    `;
    container.appendChild(div);
  });
}

function getDwLengthHeaders() {
  const allLens = [...new Set(DW_TYPES.flatMap(t=>t.lengths))].sort((a,b)=>a-b);
  return allLens.map(l=>`<div class="cell">${l}'</div>`).join('');
}

const ALL_DW_LENGTHS = [...new Set(DW_TYPES.flatMap(t=>t.lengths))].sort((a,b)=>a-b);

function renderDwRow(fl, t, idx) {
  const s = state[fl];
  const key = t.type + '_' + t.thickness + '_' + t.width;
  const flId = fl.replace(/\s/g,'_');
  const cells = ALL_DW_LENGTHS.map(l => {
    if (t.lengths.includes(l)) {
      const v = s.dw[key + '_' + l] || 0;
      const safeKey = encodeURIComponent(key + '_' + l);
      return '<div class="cell"><input type="number" min="0" step="1" value="' + v + '" '
        + 'data-fl="' + flId + '" data-sec="dw" data-key="' + safeKey + '" '
        + 'oninput="handleInput(this)" /></div>';
    }
    return '<div class="cell" style="background:var(--c-bg);border-radius:5px;"></div>';
  });
  const sub = t.lengths.reduce((sum,l) => sum + (s.dw[key + '_' + l]||0), 0);
  return '<div class="dw-row">'
    + '<div class="cell"><span class="cell type-badge ' + t.badge + '">' + t.type + '</span></div>'
    + '<div class="cell label">' + t.thickness + '</div>'
    + '<div class="cell label">' + t.width + '</div>'
    + cells.join('')
    + '<div class="cell computed" id="dw-sub-' + flId + '-' + idx + '">' + sub + '</div>'
    + '</div>';
}

function calcDwTotal(fl) {
  const s = state[fl];
  return Object.values(s.dw).reduce((a,b)=>a+b, 0);
}

function recalcDwBadge(fl) {
  const total = calcDwTotal(fl);
  const id = fl.replace(/\s/g,'_');
  const badge = document.getElementById(`dw-badge-${id}`);
  if (badge) badge.textContent = `${total} sheets`;
  // update subtotals
  DW_TYPES.forEach((t,i) => {
    const key = `${t.type}_${t.thickness}_${t.width}`;
    const sub = t.lengths.reduce((s2,l) => s2 + (state[fl].dw[`${key}_${l}`]||0), 0);
    const el = document.getElementById(`dw-sub-${id}-${i}`);
    if (el) el.textContent = sub;
  });
  recalcSummary();
}

// ---- BEAD ----
function renderBead() {
  const floors = getFloors();
  const container = document.getElementById('bead-floors');
  container.innerHTML = '';
  const allBeadLens = [...new Set(BEAD_TYPES.flatMap(t=>t.lengths))].sort((a,b)=>a-b);

  floors.forEach(fl => {
    const s = state[fl];
    const div = document.createElement('div');
    div.className = 'floor-section';

    const totalFt = calcBeadTotal(fl);
    const isCollapsed = s.collapsed.bead;

    div.innerHTML = `
      <div class="floor-header" onclick="toggleFloor('bead','${fl}')">
        <span class="floor-title">${fl}</span>
        <div style="display:flex;align-items:center;gap:10px;">
          <span class="floor-badge" id="bead-badge-${fl.replace(/\s/g,'_')}">${totalFt} ft</span>
          <span class="toggle-icon ${isCollapsed ? '' : 'open'}" id="bead-toggle-${fl.replace(/\s/g,'_')}">&#9654;</span>
        </div>
      </div>
      <div class="floor-body ${isCollapsed ? 'collapsed' : ''}" id="bead-body-${fl.replace(/\s/g,'_')}">
        <div class="table-scroll">
          <div class="bead-grid">
            <div class="bead-row header">
              <div class="cell">Bead type</div>
              ${allBeadLens.map(l=>`<div class="cell">${l}' lengths</div>`).join('')}
              <div class="cell">Total ft</div>
            </div>
            ${BEAD_TYPES.map((t,i) => {
              const cells = allBeadLens.map(l => {
                if (t.lengths.includes(l)) {
                  const v = s.bead[`${t.name}_${l}`]||0;
                  const safeKeyB = encodeURIComponent(t.name + '_' + l);
                  const flIdB = fl.replace(/\s/g,'_');
                  return '<div class="cell"><input type="number" min="0" step="1" value="' + v + '" '
                    + 'data-fl="' + flIdB + '" data-sec="bead" data-key="' + safeKeyB + '" data-len="' + l + '" '
                    + 'oninput="handleInput(this)" /></div>';
                }
                return `<div class="cell" style="background:var(--c-bg);border-radius:5px;"></div>`;
              });
              const subFt = t.lengths.reduce((sum,l)=>sum+(s.bead[`${t.name}_${l}`]||0)*l,0);
              return `<div class="bead-row">
                <div class="cell label">${t.label}</div>
                ${cells.join('')}
                <div class="cell computed" id="bead-sub-${fl.replace(/\s/g,'_')}-${i}">${subFt}</div>
              </div>`;
            }).join('')}
          </div>
        </div>
        <div class="extras-grid">
          ${EXTRAS_BEAD.map(e=>`
            <div class="extra-item">
              <label>${e.label}</label>
              <input type="${e.type||'number'}" min="0" value="${s.extras_bead[e.key]||''}"
                oninput="state['${fl}'].extras_bead['${e.key}']=this.value" />
            </div>`).join('')}
        </div>
      </div>
    `;
    container.appendChild(div);
  });
}

function calcBeadTotal(fl) {
  const s = state[fl];
  return BEAD_TYPES.reduce((sum,t) =>
    sum + t.lengths.reduce((s2,l) => s2 + (s.bead[`${t.name}_${l}`]||0)*l, 0), 0);
}

function recalcBeadBadge(fl) {
  const total = calcBeadTotal(fl);
  const id = fl.replace(/\s/g,'_');
  const badge = document.getElementById(`bead-badge-${id}`);
  if (badge) badge.textContent = `${total} ft`;
  BEAD_TYPES.forEach((t,i) => {
    const subFt = t.lengths.reduce((sum,l)=>sum+(state[fl].bead[`${t.name}_${l}`]||0)*l,0);
    const el = document.getElementById(`bead-sub-${id}-${i}`);
    if (el) el.textContent = subFt;
  });
  recalcSummary();
}

// ---- STEEL ----
function renderSteel() {
  const floors = getFloors();
  const container = document.getElementById('steel-floors');
  container.innerHTML = '';
  const allSteelLens = [8,9,10,12];

  floors.forEach(fl => {
    const s = state[fl];
    const div = document.createElement('div');
    div.className = 'floor-section';

    const totalFt = calcSteelTotal(fl);
    const isCollapsed = s.collapsed.steel;

    div.innerHTML = `
      <div class="floor-header" onclick="toggleFloor('steel','${fl}')">
        <span class="floor-title">${fl}</span>
        <div style="display:flex;align-items:center;gap:10px;">
          <span class="floor-badge" id="steel-badge-${fl.replace(/\s/g,'_')}">${totalFt} ft</span>
          <span class="toggle-icon ${isCollapsed ? '' : 'open'}" id="steel-toggle-${fl.replace(/\s/g,'_')}">&#9654;</span>
        </div>
      </div>
      <div class="floor-body ${isCollapsed ? 'collapsed' : ''}" id="steel-body-${fl.replace(/\s/g,'_')}">
        <div class="table-scroll">
          <div class="steel-grid">
            <div class="steel-row header">
              <div class="cell">Type</div>
              <div class="cell">Size</div>
              ${allSteelLens.map(l=>`<div class="cell">${l}' pc</div>`).join('')}
              <div class="cell">Total ft</div>
            </div>
            ${STEEL_TYPES.map((t,i) => {
              const cells = allSteelLens.map(l => {
                if (t.lengths.includes(l)) {
                  const v = s.steel[`${t.type}_${t.size}_${l}`]||0;
                  const safeKeyS = encodeURIComponent(t.type + '_' + t.size + '_' + l);
                  const flIdS = fl.replace(/\s/g,'_');
                  return '<div class="cell"><input type="number" min="0" step="1" value="' + v + '" '
                    + 'data-fl="' + flIdS + '" data-sec="steel" data-key="' + safeKeyS + '" '
                    + 'oninput="handleInput(this)" /></div>';
                }
                return `<div class="cell" style="background:var(--c-bg);border-radius:5px;"></div>`;
              });
              const subFt = t.lengths.reduce((sum,l)=>sum+(s.steel[`${t.type}_${t.size}_${l}`]||0)*l,0);
              return `<div class="steel-row">
                <div class="cell label">${t.type}</div>
                <div class="cell label">${t.size}</div>
                ${cells.join('')}
                <div class="cell computed" id="steel-sub-${fl.replace(/\s/g,'_')}-${i}">${subFt}</div>
              </div>`;
            }).join('')}
          </div>
        </div>
        <div class="extras-grid">
          ${EXTRAS_STEEL.map(e=>`
            <div class="extra-item">
              <label>${e.label}</label>
              <input type="number" min="0" value="${s.extras_steel[e.key]||0}"
                oninput="state['${fl}'].extras_steel['${e.key}']=+this.value" />
            </div>`).join('')}
        </div>
      </div>
    `;
    container.appendChild(div);
  });
}

function calcSteelTotal(fl) {
  const s = state[fl];
  return STEEL_TYPES.reduce((sum,t)=>
    sum+t.lengths.reduce((s2,l)=>s2+(s.steel[`${t.type}_${t.size}_${l}`]||0)*l,0),0);
}

function recalcSteelBadge(fl) {
  const total = calcSteelTotal(fl);
  const id = fl.replace(/\s/g,'_');
  const badge = document.getElementById(`steel-badge-${id}`);
  if (badge) badge.textContent = `${total} ft`;
  STEEL_TYPES.forEach((t,i)=>{
    const subFt = t.lengths.reduce((sum,l)=>sum+(state[fl].steel[`${t.type}_${t.size}_${l}`]||0)*l,0);
    const el = document.getElementById(`steel-sub-${id}-${i}`);
    if (el) el.textContent = subFt;
  });
  recalcSummary();
}

// ---- SUMMARY ----
function recalcSummary() {
  const floors = getFloors();
  const waste = 1 + (parseFloat(document.getElementById('wastePct').value)||10)/100;

  let totalDw = 0, totalBeadFt = 0, totalSteelFt = 0;
  const byFloor = floors.map(fl => {
    const dw = calcDwTotal(fl);
    const bead = calcBeadTotal(fl);
    const steel = calcSteelTotal(fl);
    totalDw += dw;
    totalBeadFt += bead;
    totalSteelFt += steel;
    return { fl, dw, bead, steel };
  });

  const dwWithWaste = Math.ceil(totalDw * waste);
  const sc = document.getElementById('summary-content');
  if (!sc) return;

  sc.innerHTML = `
    <div class="summary-panel">
      <div class="summary-title">Project totals</div>
      <div class="summary-grid">
        <div class="summary-card highlight">
          <div class="sc-label">Drywall sheets (raw)</div>
          <div class="sc-value">${totalDw}</div>
          <div class="sc-unit">pieces</div>
        </div>
        <div class="summary-card highlight">
          <div class="sc-label">Sheets + ${document.getElementById('wastePct').value}% waste</div>
          <div class="sc-value">${dwWithWaste}</div>
          <div class="sc-unit">pieces to order</div>
        </div>
        <div class="summary-card">
          <div class="sc-label">Bead total</div>
          <div class="sc-value">${totalBeadFt}</div>
          <div class="sc-unit">linear feet</div>
        </div>
        <div class="summary-card">
          <div class="sc-label">Steel total</div>
          <div class="sc-value">${totalSteelFt}</div>
          <div class="sc-unit">linear feet</div>
        </div>
      </div>
    </div>

    <div class="summary-panel">
      <div class="summary-title">Drywall by floor</div>
      <table class="print-table">
        <thead><tr><th>Floor</th><th class="num">Sheets (raw)</th><th class="num">+ Waste</th><th class="num">Bead (ft)</th><th class="num">Steel (ft)</th></tr></thead>
        <tbody>
          ${byFloor.map(r=>`
            <tr>
              <td>${r.fl}</td>
              <td class="num">${r.dw}</td>
              <td class="num">${Math.ceil(r.dw*waste)}</td>
              <td class="num">${r.bead}</td>
              <td class="num">${r.steel}</td>
            </tr>`).join('')}
          <tr class="total-row">
            <td>TOTAL</td>
            <td class="num">${totalDw}</td>
            <td class="num">${dwWithWaste}</td>
            <td class="num">${totalBeadFt}</td>
            <td class="num">${totalSteelFt}</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="summary-panel">
      <div class="summary-title">Drywall by type (all floors)</div>
      <table class="print-table">
        <thead><tr><th>Type</th><th>Thickness</th><th>Width</th><th class="num">Sheets (raw)</th><th class="num">+ Waste</th></tr></thead>
        <tbody>
          ${DW_TYPES.map(t => {
            const key = `${t.type}_${t.thickness}_${t.width}`;
            const total = floors.reduce((sum,fl)=>
              sum+t.lengths.reduce((s2,l)=>s2+(state[fl]?.dw[`${key}_${l}`]||0),0),0);
            if (total === 0) return '';
            return `<tr>
              <td><span class="cell type-badge ${t.badge}">${t.type}</span></td>
              <td>${t.thickness}</td><td>${t.width}</td>
              <td class="num">${total}</td>
              <td class="num">${Math.ceil(total*waste)}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function handleInput(el) {
  const fl = FLOORS.find(f => f.replace(/\s/g,'_') === el.dataset.fl);
  if (!fl) return;
  const sec = el.dataset.sec;
  const key = decodeURIComponent(el.dataset.key);
  const val = +el.value;
  state[fl][sec][key] = val;
  if (sec === 'dw') recalcDwBadge(fl);
  else if (sec === 'bead') recalcBeadBadge(fl);
  else if (sec === 'steel') recalcSteelBadge(fl);
}

function recalcAll() {
  const floors = getFloors();
  floors.forEach(fl => {
    recalcDwBadge(fl);
    recalcBeadBadge(fl);
    recalcSteelBadge(fl);
  });
  recalcSummary();
}

// ---- UI helpers ----
function toggleFloor(section, fl) {
  const id = fl.replace(/\s/g,'_');
  const body = document.getElementById(`${section}-body-${id}`);
  const icon = document.getElementById(`${section}-toggle-${id}`);
  if (!body) return;
  const isOpen = !body.classList.contains('collapsed');
  body.classList.toggle('collapsed', isOpen);
  icon.classList.toggle('open', !isOpen);
  state[fl].collapsed[section] = isOpen;
}

function showTab(name, el) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.sidebar-item').forEach(s => s.classList.remove('active'));
  document.getElementById(`tab-${name}`).classList.add('active');
  el.classList.add('active');
  if (name === 'summary') recalcSummary();
}

function clearAll() {
  if (!confirm('Clear all quantities? This cannot be undone.')) return;
  renderFloors();
}

// ---- Init ----
initState();
renderFloors();
</script>
</body>
</html>
